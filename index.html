<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto Matrix v9.2</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #1a73e8; --gap: 15px; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; display: flex; flex-direction: column; gap: var(--gap); padding-bottom: 20px; }
        
        /* 실시간 당첨 번호 헤더 */
        .live-result-box { background: #202124; padding: 18px; border-radius: 25px; text-align: center; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .live-title { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .live-balls { display: flex; justify-content: center; gap: 6px; align-items: center; min-height: 32px; }
        .l-ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 800; color: white; border: 1.5px solid rgba(255,255,255,0.2); }
        .l-plus { font-size: 1.2rem; font-weight: bold; color: #777; margin: 0 2px; }

        .section-box { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .standard-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; width: 100%; }
        
        .ball, .guide-ball { aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; width: 100%; overflow: hidden; background-color: #eee; }
        .ball { cursor: pointer; border: none; outline: none; }
        .ball-num { position: absolute; font-weight: 800; font-size: 0.9rem; z-index: 1; color: rgba(0,0,0,0.8); }
        .ball-label { position: relative; z-index: 2; display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .icon-svg { width: 65%; height: 65%; fill: none; stroke: currentColor; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
        .txt-label { font-size: 0.65rem; letter-spacing: -1.2px; font-weight: 900; white-space: nowrap; transform: scaleX(0.85); fill: currentColor; }
        
        /* 상태별 색상 */
        .s1 { background-color: #333 !important; color: #fff; }
        .s2 { background-color: #cfd8dc !important; color: #444; } 
        .s3 { background-color: #eceff1 !important; color: #666; }
        .s4 { background-color: #69c8f2 !important; border: 1.5px solid #555; color: #fff; }
        .s5 { background-color: #fbc400 !important; border: 2px solid #000; color: #fff; }
        .s6 { background-color: #ef5350 !important; border: 2.5px solid #ef5350; color: #fff; }

        .collapsible { background: #f8f9fa; border-radius: 15px; margin-top: 10px; overflow: hidden; border: 1px solid #eee; }
        .collapsible-header { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; }
        .collapsible-header span { font-size: 0.8rem; font-weight: bold; color: #555; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; background: #fff; }
        .desc-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .weight-input { width: 60px; padding: 6px; border: 1px solid #ddd; border-radius: 8px; text-align: right; font-size: 0.8rem; font-weight: bold; color: var(--primary); outline: none; }
        
        .gen-btn { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        #results { padding: 20px 10px; background: #fffbe6; border-radius: 20px; border: 1px dashed #ffd666; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .res-row { display: flex; align-items: center; justify-content: center; width: 100%; padding: 5px 0; }
        .res-idx { font-size: 0.65rem; font-weight: bold; color: #bbb; margin-right: 10px; width: 20px; text-align: right; }
        .res-ball-group { display: flex; gap: 6px; }
        .res-ball { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.05rem; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.1); }
        .footer-legal { text-align: center; font-size: 0.6rem; color: #bbb; padding: 10px 0; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div id="live-header" class="live-result-box">
        <div id="draw-info" class="live-title">데이터를 불러오는 중...</div>
        <div id="live-balls" class="live-balls"></div>
    </div>

    <div class="section-box">
        <div id="guide-grid" class="standard-grid"></div>
        <div class="collapsible">
            <div class="collapsible-header" onclick="toggleAccordion()">
                <span>💡 옵션별 배수 설정 (보통=1.0)</span>
                <span id="accordion-status">- 펼치기</span>
            </div>
            <div id="accordion-content" class="collapsible-content">
                <div id="probability-desc"></div>
            </div>
        </div>
    </div>

    <div class="section-box">
        <div id="grid" class="standard-grid"></div>
    </div>

    <button class="gen-btn" onclick="generate()">🎲 예측 번호 생성</button>
    <div id="results" style="display:none;"></div>
    
    <div class="footer-legal">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</div>
</div>

<script>
    // ⚠️ 사용자님의 Cloudflare Worker URL을 여기에 입력하세요!
    const WORKER_URL = "https://lottowrk.khscrr.workers.dev"; 

    let userWeights = [1.0, 0, 0.1, 0.5, 2.0, 10.0, 10000]; 
    const states = Array(46).fill(0);

    async function fetchLatestLotto() {
        const drawInfo = document.getElementById('draw-info');
        try {
            const baseDate = new Date('2023-12-30T21:00:00'); // 1100회 기준
            const now = new Date();
            const diffWeeks = Math.floor((now - baseDate) / (7 * 24 * 60 * 60 * 1000));
            let targetDrwNo = 1100 + diffWeeks;

            const baseUrl = WORKER_URL.endsWith('/') ? WORKER_URL : WORKER_URL + '/';
            const response = await fetch(`${baseUrl}?drwNo=${targetDrwNo}`);
            
            // 응답 텍스트를 먼저 받고 JSON으로 파싱 시도 (디버깅 용이)
            const rawText = await response.text();
            let data;
            try {
                data = JSON.parse(rawText);
            } catch(e) {
                throw new Error("JSON 파싱 실패");
            }

            if (data.returnValue === "success") {
                renderLiveBalls(data);
            } else {
                // 이번 주 결과 미발표 시 이전 회차 시도
                const prevRes = await fetch(`${baseUrl}?drwNo=${targetDrwNo - 1}`);
                const prevData = await prevRes.json();
                renderLiveBalls(prevData);
            }
        } catch (e) {
            drawInfo.innerText = "당첨 정보를 불러올 수 없습니다 (차단됨)";
            console.error("Fetch Error:", e);
        }
    }

    function renderLiveBalls(data) {
        const drawInfo = document.getElementById('draw-info');
        const ballContainer = document.getElementById('live-balls');
        
        if (!data || !data.drwtNo1) return;

        drawInfo.innerText = `제 ${data.drwNo}회 당첨 결과 (${data.drwNoDate})`;
        const nums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6];
        
        ballContainer.innerHTML = nums.map(n => 
            `<div class="l-ball" style="background:${getBallColor(Number(n))}">${n}</div>`
        ).join('') + `<div class="l-plus">+</div><div class="l-ball" style="background:${getBallColor(Number(data.bnusNo))}">${data.bnusNo}</div>`;
    }

    function getBallColor(n) {
        if (n <= 10) return '#fbc400';
        if (n <= 20) return '#69c8f2';
        if (n <= 30) return '#ff7272';
        if (n <= 40) return '#aaaaaa';
        return '#b0d840';
    }

    // --- 이하 기존 UI 로직 ---
    function toggleAccordion() {
        const content = document.getElementById('accordion-content');
        const status = document.getElementById('accordion-status');
        if (content.style.maxHeight && content.style.maxHeight !== '0px') {
            content.style.maxHeight = '0px'; status.innerText = "- 펼치기";
        } else {
            content.style.maxHeight = content.scrollHeight + "px"; status.innerText = "- 접기";
        }
    }

    function initGuide() {
        const guideGrid = document.getElementById('guide-grid');
        const labels = ["보통", "제외", "확률", "확률", "확률", "확률", "포함"];
        for(let i=0; i<=6; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'g-item-wrapper';
            wrapper.innerHTML = `<div class="guide-ball s${i}"><span class="ball-num">45</span></div><span class="g-text">${labels[i]}</span>`;
            guideGrid.appendChild(wrapper);
        }
    }

    function initGrid() {
        const g = document.getElementById('grid');
        for(let i=1; i<=45; i++) {
            const b = document.createElement('button');
            b.className = 'ball s0'; b.style.backgroundColor = getBallColor(i);
            b.innerHTML = `<span class="ball-num">${i}</span><div class="ball-label" id="label-${i}"></div>`;
            b.onclick = () => {
                states[i] = (states[i] + 1) % 7;
                b.className = 'ball s' + states[i];
                b.style.backgroundColor = states[i] === 0 ? getBallColor(i) : '';
                const labels = ["", "제외", "▼▼", "▼", "▲", "▲▲", "포함"];
                document.getElementById('label-'+i).innerHTML = `<span class="txt-label">${labels[states[i]]}</span>`;
                document.getElementById('label-'+i).style.display = states[i] === 0 ? 'none' : 'flex';
            };
            g.appendChild(b);
        }
    }

    function generate() {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = ''; resDiv.style.display = 'flex';
        const fixed = states.map((s, i) => s === 6 ? i : null).filter(v => v);
        if(fixed.length > 6) { alert("포함할 숫자는 6개 이하로 해주세요!"); return; }

        for(let g=0; g<5; g++) {
            let picks = [...fixed];
            let pool = [];
            for(let i=1; i<=45; i++) {
                if(picks.includes(i) || states[i] === 1) continue;
                let weight = Math.round(userWeights[states[i]] * 10);
                for(let j=0; j<weight; j++) pool.push(i);
            }
            while(picks.length < 6 && pool.length > 0) {
                const idx = Math.floor(Math.random()*pool.length);
                const pick = pool[idx];
                picks.push(pick);
                pool = pool.filter(n => n !== pick);
            }
            const row = document.createElement('div');
            row.className = 'res-row';
            row.innerHTML = `<div class="res-idx">#${g+1}</div><div class="res-ball-group">${picks.sort((a,b)=>a-b).map(n => `<div class="res-ball" style="background:${getBallColor(n)}">${n}</div>`).join('')}</div>`;
            resDiv.appendChild(row);
        }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    initGuide(); initGrid(); fetchLatestLotto(); 
</script>
</body>
</html>
