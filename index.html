<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로또 조회 테스트</title>
</head>

<body>

<h2>로또 조회</h2>

<button onclick="loadLotto()">조회</button>

<div id="result"></div>

<script>

function estimateRound(){
    const start = new Date("2002-12-07");
    const now = new Date();
    const diff = now - start;
    return Math.floor(diff / (1000*60*60*24*7));
}

async function fetchRound(round){

    const api =
    `https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${round}`

    const url =
    `https://corsproxy.io/?${encodeURIComponent(api)}`

    const res = await fetch(url)

    const data = await res.json()

    if(data.returnValue !== "success") return null

    return data
}

async function loadLotto(){

    document.getElementById("result").innerText="조회중..."

    let round = estimateRound()

    for(let i=0;i<5;i++){

        let data = await fetchRound(round)

        if(data){

            document.getElementById("result").innerHTML =
            `${data.drwNo}회 (${data.drwNoDate})<br>
            ${data.drwtNo1}, 
            ${data.drwtNo2}, 
            ${data.drwtNo3}, 
            ${data.drwtNo4}, 
            ${data.drwtNo5}, 
            ${data.drwtNo6} 
            + ${data.bnusNo}`

            return
        }

        round--
    }

    document.getElementById("result").innerText="조회 실패"
}

</script>

</body>
</html>
