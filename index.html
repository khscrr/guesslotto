<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto Matrix v13.4</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_CLIENT_ID" crossorigin="anonymous"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #1a73e8; --danger: #ef5350; --success: #34a853; --gap: 15px; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 480px; width: 100%; display: flex; flex-direction: column; gap: var(--gap); padding-bottom: 20px; }
        .section-box { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .standard-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; width: 100%; }
        
        /* 광고 영역 */
        .ad-slot { width: 100%; text-align: center; background: #eee; border-radius: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; }

        /* 헤더 & 통계 */
        .info-header { background: #202124; padding: 15px; border-radius: 20px; text-align: center; color: white; }
        .win-info-text { font-size: 0.75rem; color: #999; margin-bottom: 8px; font-weight: bold; }
        .win-display { display: flex; justify-content: center; gap: 5px; align-items: center; margin-bottom: 12px; }
        .w-ball { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .header-btn-group { display: flex; gap: 8px; margin-top: 5px; }
        .h-btn { flex: 1; padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; border: none; cursor: pointer; color: white; }
        .btn-stats { background: #444; border: 1px solid #555; }
        .btn-official { background: var(--success); text-decoration: none; display: flex; align-items: center; justify-content: center; }

        #stats-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #2a2b2e; border-radius: 18px; margin-top: 10px; text-align: left; }
        .stats-inner { padding: 15px; }
        .stats-title { font-weight: bold; padding: 5px 0; color: #4da3ff; margin-bottom: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .stats-title::before { content: "●"; font-size: 0.6rem; }
        .stats-row { margin-bottom: 15px; }
        .stats-label { font-size: 0.7rem; color: #888; margin-bottom: 6px; display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .stats-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .s-ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; color: white; }
        .s-count { font-size: 0.6rem; color: #34a853; font-weight: bold; }

        /* 그래프 */
        .chart-container { display: flex; align-items: flex-end; gap: 2px; height: 45px; padding: 5px 0; border-bottom: 1px solid #444; }
        .chart-bar { flex: 1; min-width: 4px; border-radius: 2px 2px 0 0; position: relative; }
        .chart-bar:hover::after { content: attr(data-val); position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 9px; color: white; white-space: nowrap; z-index: 10; }

        /* 조합 분석 (세로형 리스트) */
        .combo-list { display: flex; flex-direction: column; gap: 5px; }
        .combo-item { background: #38393d; padding: 6px 10px; border-radius: 10px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        .combo-nums { display: flex; gap: 3px; }
        .c-ball { width: 19px; height: 19px; border-radius: 50%; font-size: 0.65rem; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; }
        .c-count { font-size: 0.65rem; color: var(--success); font-weight: bold; }

        /* 번호판 */
        .ball { aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; width: 100%; cursor: pointer; border: none; background-color: #eee; }
        .ball-num { position: absolute; font-weight: 800; font-size: 0.9rem; z-index: 1; color: rgba(0,0,0,0.8); }
        .ball-label { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .icon-svg { width: 60%; height: 60%; fill: none; stroke: currentColor; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
        .txt-label { font-size: 0.6rem; font-weight: 900; white-space: nowrap; } 
        
        .s1 { background-color: #333 !important; color: #fff; }
        .s4 { background-color: #69c8f2 !important; border: 1.5px solid #555; }
        .s5 { background-color: #fbc400 !important; border: 2px solid #000; }
        .s6 { background-color: #ef5350 !important; border: 2.5px solid #ef5350; }

        /* 결과 리스트 */
        #results-container { display: none; flex-direction: column; gap: var(--gap); }
        #results-list { padding: 15px 10px; background: #fffbe6; border-radius: 20px; border: 1px dashed #ffd666; display: flex; flex-direction: column; gap: 8px; }
        .res-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .res-idx { font-weight: 900; color: #d4a017; font-size: 0.9rem; width: 15px; }
        .res-ball { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1rem; }
        
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 20px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-reset { background: var(--danger); }
        .btn-generate { background: var(--primary); }

        /* 쿠팡 파트너스 안내 문구 */
        .legal-notice { font-size: 10px; color: #999; text-align: center; line-height: 1.4; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-slot">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_CLIENT_ID" data-ad-slot="YOUR_SLOT_ID" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="info-header">
        <div id="win-status" class="win-info-text">데이터 로드 중...</div>
        <div id="win-display" class="win-display"></div>
        <div class="header-btn-group">
            <button class="h-btn btn-stats" onclick="toggleStats()">📊 통계 데이터 분석</button>
            <a href="https://m.dhlottery.co.kr/lt645/result" target="_blank" class="h-btn btn-official">🎯 결과 확인</a>
        </div>
        
        <div id="stats-content">
            <div class="stats-inner">
                <div id="stats-all-target"></div>
                <div class="stats-title">전체 회차 빈도</div>
                <div id="chart-all-area" class="chart-container" style="margin-bottom:10px;"></div>
                
                <div style="background:#38393d; padding:10px; border-radius:12px; margin:10px 0; display:flex; align-items:center; justify-content:center; gap:8px; font-size:0.75rem; color:#fff; border:1px solid #444;">
                    <span>최근</span>
                    <select id="stats-n-range" onchange="refreshStats(true)" style="background:#222; color:#fff; border:1px solid #666; border-radius:5px;"></select>
                    <span>회 분석</span>
                    <label style="margin-left:5px; display:flex; align-items:center; gap:3px;"><input type="checkbox" id="stats-bonus-check" checked onchange="refreshStats(true)"> 보너스</label>
                </div>

                <div id="stats-recent-target"></div>
                <div class="stats-title">선택 회차 빈도</div>
                <div id="chart-recent-area" class="chart-container"></div>
                <div style="display:flex; justify-content:space-between; font-size:7px; color:#666; margin-top:2px; margin-bottom:15px; padding:0 2px;"><span>1</span><span>10</span><span>20</span><span>30</span><span>40</span><span>45</span></div>

                <div class="stats-title">베스트 콤비 (TOP 6)</div>
                <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:10px;">
                    <div><span class="stats-label">✌️ 2개 조합</span><div id="combo-2-target" class="combo-list"></div></div>
                    <div><span class="stats-label">🤟 3개 조합</span><div id="combo-3-target" class="combo-list"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-box"><div id="guide-grid" class="standard-grid"></div></div>
    <div class="section-box"><div id="grid" class="standard-grid"></div></div>

    <div class="btn-group" style="display:flex; gap:10px;">
        <button class="action-btn btn-reset" onclick="resetAll()">🔄 초기화</button>
        <button class="action-btn btn-generate" onclick="generate()">🎲 번호 생성</button>
    </div>

    <div id="results-container">
        <div id="results-list"></div>
        <button onclick="sendKakaoAll()" style="width:100%; padding:14px; background:#FEE500; border:none; border-radius:15px; font-weight:bold; margin-top:10px;">카카오톡 공유</button>
    </div>

    <div class="ad-slot">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_CLIENT_ID" data-ad-slot="YOUR_SLOT_ID_BOTTOM" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="legal-notice">
        이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.<br>
        당첨을 보장하지 않으며, 결과에 대한 책임은 사용자 본인에게 있습니다.
    </div>
</div>

<script>
    const KAKAO_KEY = 'f1f225756190be892980478becc91d13';
    const DEFAULT_RANGE = 52;
    let userWeights = [1.0, 0, 0.1, 0.5, 2.0, 10.0, 10000]; 
    const states = Array(46).fill(0);
    let winNumbers = []; 
    let cachedHistory = [];

    function getIcon(state) {
        const svg = `<svg class="icon-svg" viewBox="0 0 24 24">`;
        switch(state) {
            case 1: return `<span class="txt-label">제외</span>`;
            case 2: return svg + `<path d="M7 7l5 5 5-5M7 14l5 5 5-5"/></svg>`; 
            case 3: return svg + `<path d="M7 10l5 5 5-5"/></svg>`; 
            case 4: return svg + `<path d="M7 14l5-5 5 5"/></svg>`; 
            case 5: return svg + `<path d="M7 10l5-5 5 5M7 17l5-5 5 5"/></svg>`; 
            case 6: return `<span class="txt-label">포함</span>`;
            default: return "";
        }
    }

    function getBallColor(n) {
        if (n <= 10) return '#fbc400'; if (n <= 20) return '#69c8f2';
        if (n <= 30) return '#ff7272'; if (n <= 40) return '#aaaaaa';
        return '#b0d840';
    }

    function refreshStats(isUserAction = false) {
        if(!cachedHistory.length) return;
        const nRange = parseInt(document.getElementById('stats-n-range').value);
        const includeBonus = document.getElementById('stats-bonus-check').checked;
        if(isUserAction) document.getElementById('stats-n-range').blur();

        const createBlockHtml = (data, title, chartId) => {
            let counts = Array(46).fill(0);
            data.forEach(draw => { draw[2].forEach(n => counts[n]++); if(includeBonus) counts[draw[3]]++; });
            let sorted = []; for(let i=1; i<=45; i++) sorted.push({num: i, count: counts[i]});
            const most = [...sorted].sort((a,b) => b.count - a.count).slice(0,6);
            const least = [...sorted].sort((a,b) => a.count - b.count).slice(0,6);
            const maxV = Math.max(...counts) + 2;
            document.getElementById(chartId).innerHTML = counts.slice(1).map((c,i)=>`<div class="chart-bar" style="height:${(c/maxV)*100}%; background:${getBallColor(i+1)}" data-val="${c}회"></div>`).join('');
            const makeGrid = (list) => `<div class="stats-grid">${list.map(item => `<div class="stats-unit"><div class="s-ball" style="background:${getBallColor(item.num)}">${item.num}</div><div class="s-count">${item.count}회</div></div>`).join('')}</div>`;
            return `<div class="stats-title">${title}</div><div class="stats-row"><span class="stats-label">🔥 최다</span>${makeGrid(most)}</div><div class="stats-row"><span class="stats-label">❄️ 최소</span>${makeGrid(least)}</div>`;
        };
        
        document.getElementById("stats-all-target").innerHTML = createBlockHtml(cachedHistory, "전체 누적 통계", "chart-all-area");
        const recentData = cachedHistory.slice(0, nRange);
        document.getElementById("stats-recent-target").innerHTML = createBlockHtml(recentData, `최근 ${nRange}회 분석`, "chart-recent-area");

        let pairs = {}; let triplets = {};
        recentData.forEach(draw => {
            const nums = [...draw[2], includeBonus ? draw[3] : null].filter(v=>v).sort((a,b)=>a-b);
            for(let i=0; i<nums.length; i++) {
                for(let j=i+1; j<nums.length; j++) {
                    const k2 = `${nums[i]},${nums[j]}`; pairs[k2] = (pairs[k2]||0)+1;
                    for(let k=j+1; k<nums.length; k++) { const k3 = `${nums[i]},${nums[j]},${nums[k]}`; triplets[k3] = (triplets[k3]||0)+1; }
                }
            }
        });
        
        const renderCombo = (obj, target, limit) => {
            const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0, limit);
            document.getElementById(target).innerHTML = sorted.map(([nums, count]) => `
                <div class="combo-item">
                    <div class="combo-nums">${nums.split(',').map(n => `<div class="c-ball" style="background:${getBallColor(parseInt(n))}">${n}</div>`).join('')}</div>
                    <div class="c-count">${count}회</div>
                </div>`).join('');
        };
        renderCombo(pairs, 'combo-2-target', 6); renderCombo(triplets, 'combo-3-target', 6);
    }

    async function loadLotto() {
        try {
            const res = await fetch(`https://lottowrk.khscrr.workers.dev/?action=history`);
            cachedHistory = await res.json();
            if (cachedHistory.length > 0) {
                const latest = cachedHistory[0];
                winNumbers = [...latest[2], latest[3]];
                document.getElementById("win-status").innerText = `제 ${latest[0]}회 당첨 번호`;
                document.getElementById("win-display").innerHTML = latest[2].map(n => `<div class="w-ball" style="background:${getBallColor(n)}">${n}</div>`).join('') + `<div style="margin:0 5px; color:#555; font-weight:bold;">+</div><div class="w-ball" style="background:${getBallColor(latest[3])}">${latest[3]}</div>`;
                winNumbers.forEach(n => { if(document.getElementById("n"+n)) document.getElementById("n"+n).classList.add("win-hit"); });
                const select = document.getElementById('stats-n-range');
                for (let i = cachedHistory.length; i >= 1; i--) {
                    const opt = document.createElement('option'); opt.value = i; opt.innerText = i;
                    if (i === DEFAULT_RANGE) opt.selected = true;
                    select.appendChild(opt);
                }
                refreshStats(); loadSavedResults();
            }
        } catch (e) { console.error(e); }
    }

    function initGrid() {
        const g = document.getElementById('grid');
        for(let i=1; i<=45; i++) {
            const b = document.createElement('button');
            b.id = 'n'+i; b.className = 'ball s0'; b.style.backgroundColor = getBallColor(i);
            b.innerHTML = `<span class="ball-num">${i}</span><div class="ball-label" id="label-${i}"></div>`;
            b.onclick = () => { states[i] = (states[i] + 1) % 7; renderBall(i); };
            g.appendChild(b);
        }
    }

    function renderBall(i) {
        const b = document.getElementById('n'+i);
        b.className = 'ball s' + states[i] + (b.classList.contains('win-hit') ? ' win-hit' : '');
        b.style.backgroundColor = states[i] === 0 ? getBallColor(i) : '';
        document.getElementById('label-'+i).innerHTML = getIcon(states[i]);
    }

    function generate() {
        const results = [];
        const fixed = states.map((s, i) => s === 6 ? i : null).filter(v => v);
        if(fixed.length > 6) { alert("포함 번호는 최대 6개!"); return; }
        for(let g=0; g<5; g++) {
            let picks = [...fixed]; let pool = [];
            for(let i=1; i<=45; i++) {
                if(picks.includes(i) || states[i] === 1) continue;
                let w = Math.round((states[i] === 0 && winNumbers.includes(i) ? 1.0 : userWeights[states[i]]) * 100);
                for(let j=0; j<w; j++) pool.push(i);
            }
            while(picks.length < 6 && pool.length > 0) {
                const p = pool[Math.floor(Math.random()*pool.length)];
                picks.push(p); pool = pool.filter(n => n !== p);
            }
            results.push(picks.sort((a,b)=>a-b));
        }
        localStorage.setItem('last_lotto_results', JSON.stringify(results));
        displayResults(results);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function displayResults(data) {
        const listDiv = document.getElementById('results-list');
        const chars = ['A','B','C','D','E'];
        listDiv.innerHTML = ''; document.getElementById('results-container').style.display = 'flex';
        data.forEach((picks, i) => {
            const row = document.createElement('div'); row.className = 'res-row';
            row.innerHTML = `<div class="res-idx">${chars[i]}</div><div style="display:flex; gap:6px;">${picks.map(n => `<div class="res-ball" style="background:${getBallColor(n)}">${n}</div>`).join('')}</div>`;
            listDiv.appendChild(row);
        });
    }

    function loadSavedResults() { const saved = localStorage.getItem('last_lotto_results'); if(saved) displayResults(JSON.parse(saved)); }
    function resetAll() { if(!confirm("번호판을 초기화하시겠습니까?")) return; for(let i=1; i<=45; i++) { states[i] = 0; renderBall(i); } }
    function toggleStats() { const c = document.getElementById('stats-content'); c.style.maxHeight = c.style.maxHeight === '2500px' ? '0px' : '2500px'; }
    
    function initGuide() {
        const guideGrid = document.getElementById('guide-grid');
        const labels = ["보통", "제외", "↓↓", "↓", "↑", "↑↑", "포함"];
        guideGrid.innerHTML = '';
        [0,1,2,3,4,5,6].forEach(i => {
            const wrapper = document.createElement('div');
            wrapper.style = "display:flex; flex-direction:column; align-items:center; gap:2px;";
            wrapper.innerHTML = `<div class="ball s${i}" style="width:28px;height:28px;">${getIcon(i)}</div><span class="txt-label" style="color:#999; margin-top:2px;">${labels[i]}</span>`;
            guideGrid.appendChild(wrapper);
        });
    }

    function sendKakaoAll() {
        if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);
        const rows = document.querySelectorAll('.res-row');
        let txt = "🍀 로또 행운 번호\n";
        rows.forEach((row, i) => { 
            const char = row.querySelector('.res-idx').innerText;
            const nums = Array.from(row.querySelectorAll('.res-ball')).map(b => b.innerText).join(', ');
            txt += `\n${char}: ${nums}`;
        });
        Kakao.Share.sendDefault({
            objectType: 'text', text: txt + "\n\n대박 나세요! ✨",
            link: { mobileWebUrl: location.href, webUrl: location.href },
            buttons: [{ title: '번호 확인', link: { mobileWebUrl: location.href, webUrl: location.href }}]
        });
    }

    window.onload = () => { initGuide(); initGrid(); loadLotto(); };
</script>
</body>
</html>
