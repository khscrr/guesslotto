<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>로또 조회</title>
</head>

<body>

<h2>최신 로또 조회</h2>

<button onclick="loadLotto()">조회</button>

<div id="result"></div>

<script>

function estimateRound(){
    const start = new Date("2002-12-07")
    const now = new Date()
    const diff = now - start
    return Math.floor(diff / (1000*60*60*24*7))
}

function loadLotto(){

    document.getElementById("result").innerText="조회중..."

    let round = estimateRound()

    tryRound(round)
}

function tryRound(round){

    const script=document.createElement("script")

    script.src=
    "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo="+round

    script.onload=function(){

        if(returnValue==="success"){

            document.getElementById("result").innerHTML=
            drwNo+"회 ("+drwNoDate+")<br>"+
            drwtNo1+", "+
            drwtNo2+", "+
            drwtNo3+", "+
            drwtNo4+", "+
            drwtNo5+", "+
            drwtNo6+
            " + "+bnusNo

        }else{

            tryRound(round-1)

        }

    }

    document.body.appendChild(script)
}

</script>

</body>
</html>
