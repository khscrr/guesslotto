<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lotto Debug</title>

<style>
body{
font-family:Arial;
padding:20px;
}

button{
padding:10px;
font-size:18px;
}

#log{
margin-top:20px;
padding:10px;
background:#000;
color:#0f0;
font-size:14px;
white-space:pre-line;
}

.ball{
display:inline-block;
width:40px;
height:40px;
line-height:40px;
border-radius:50%;
background:#fbc400;
margin:4px;
text-align:center;
font-weight:bold;
}
</style>

</head>

<body>

<h2>로또 디버그</h2>

<button onclick="start()">조회</button>

<div id="numbers"></div>

<div id="log"></div>

<script>

function log(msg){
document.getElementById("log").innerHTML+=msg+"\\n"
}

function estimateRound(){

const start=new Date("2002-12-07")
const now=new Date()

const round=Math.floor((now-start)/(1000*60*60*24*7))

log("추정 회차: "+round)

return round
}

let currentRound

function start(){

log("버튼 클릭")

currentRound=estimateRound()

tryRound()

}

function tryRound(){

log("조회 시도 회차: "+currentRound)

const script=document.createElement("script")

script.src=
"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo="+currentRound

script.onload=function(){

log("응답 도착")

if(window.returnValue==="success"){

log("성공 회차: "+drwNo)

render()

}else{

log("fail → 이전 회차 시도")

currentRound--

tryRound()

}

}

script.onerror=function(){

log("스크립트 로딩 실패")

}

document.body.appendChild(script)

}

function render(){

const nums=[
drwtNo1,
drwtNo2,
drwtNo3,
drwtNo4,
drwtNo5,
drwtNo6
]

let html=""

nums.forEach(n=>{
html+=`<span class="ball">${n}</span>`
})

html+=" + "+bnusNo

document.getElementById("numbers").innerHTML=html

log("렌더 완료")

}

</script>

</body>
</html>
