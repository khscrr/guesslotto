<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lotto Viewer</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
}

.ball{
display:inline-block;
width:42px;
height:42px;
line-height:42px;
border-radius:50%;
margin:4px;
font-weight:bold;
color:white;
}

.c1{background:#fbc400}
.c2{background:#69c8f2}
.c3{background:#ff7272}
.c4{background:#aaa}
.c5{background:#b0d840}
</style>

</head>

<body>

<h2>로또 최신번호</h2>

<button onclick="loadLatest()">조회</button>

<div id="round"></div>
<div id="numbers"></div>

<script>

let currentRound

function color(n){
if(n<=10)return"c1"
if(n<=20)return"c2"
if(n<=30)return"c3"
if(n<=40)return"c4"
return"c5"
}

function estimateRound(){

const start=new Date("2002-12-07")
const now=new Date()

return Math.floor((now-start)/(1000*60*60*24*7))
}

function loadLatest(){

document.getElementById("round").innerText="조회중..."

currentRound=estimateRound()

tryRound()

}

function tryRound(){

const script=document.createElement("script")

script.src=
"https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo="+currentRound

script.onload=function(){

if(window.returnValue==="success"){

render()

}else{

currentRound--

tryRound()

}

}

document.body.appendChild(script)

}

drwNo+"회 ("+drwNoDate+")"

document.getElementById("numbers").innerHTML=html

}

</script>

</body>
</html>
